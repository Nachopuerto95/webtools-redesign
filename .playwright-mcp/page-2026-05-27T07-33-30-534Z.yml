            - article [ref=e190] [cursor=pointer]:
              - blockquote [ref=e192]:
                - img [ref=e193]
                - paragraph [ref=e195]: Simply put, Webtools was the answer to our global reach, at competitive prices. No request is out of the question and usually can be accommodated within the current budget and in a reasonable timeframe. Very responsive team and easy company to work with. I enjoy our partnership.
