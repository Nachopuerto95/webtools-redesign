              - blockquote:
                - img
                - paragraph: Durante los años de trabajo con WEBTOOLS como empresa proveedora de los sistemas de encuestas y evaluación de la experiencia de usuario / visitante en los centros CAIXAFORUM / COSMOCAIXA de la Fundación la Caixa, implementamos de forma satisfactoria diversas metodologías de gran valor.
              - generic:
                - generic:
                  - generic: Alejandro Fernández
                  - generic: Responsable Comercial Fundación la Caixa
            - article:
              - blockquote:
                - img
                - paragraph: Desde el 2014 llevamos una larga trayectoria con la empresa Webtools, facilitando nuestro trabajo de investigación, con una rápida respuesta a los problemas que pueden surgir en el lanzamiento de estudios. Es una herramienta versátil y a la vez sencilla. Tenemos una satisfacción muy alta con el servicio de Webtools.
              - generic:
                - generic:
                  - generic: María José García Millán
                  - generic: Torre de marcas y Estudios de mercado Orange
            - article:
              - blockquote:
                - img
                - paragraph: Estos siete años trabajando con Webtools para medir una parte fundamental de nuestro servicio han sido estupendos, siempre se han mostrado dispuestos, accesibles y muy eficaces con todas nuestras solicitudes.
