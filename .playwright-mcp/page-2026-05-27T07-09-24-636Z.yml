              - text: “Desde el 2014 llevamos una larga trayectoria con la empresa webtools, facilitando nuestro trabajo de investigación, con una rápida respuesta a los problemas que pueden surgir en el lanzamiento de estudios. Debido a las necesidades siempre urgentes de nuestro negocio contamos con el apoyo de esta compañía dando respuesta rápida a las peticiones que nos surgen. Es de valorar también la acogida de sugerencias continuas que hacemos sobre el aplicativo, y que poco a poco van dando respuesta. Es una herramienta versátil y a la vez sencilla. Tenemos una satisfacción muy alta con el servicio de Webtools. Por este motivo, tras la larga experiencia con esta empresa, puedo decir que la ayuda de Webtools ha sido fundamental en la elaboración de estudios para analizar las necesidades de nuestros clientes y configurar nuestras ofertas de acuerdo a estas.”
