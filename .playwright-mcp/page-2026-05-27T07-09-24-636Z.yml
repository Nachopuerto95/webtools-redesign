          - group "3 / 8" [ref=e164]:
            - generic [ref=e167]:
              - img [ref=e168]
              - text: Durante los años de trabajo con WEBTOOLS como empresa proveedora de los sistemas de encuestas y evaluación de la experiencia de usuario / visitante en los centros CAIXAFORUM/COSMOCAIXA de la Fundación la Caixa, implementamos de forma satisfactoria diversas metodologías de gran valor (tablets en hall y salas de exposiciones, encuestas cara cara, evaluaciones vía email, etc) que nos permitían el conocimiento y análisis de los perfiles de visitantes y su nivel de NPS y satisfacción, con informes elaborados posteriores siempre dentro de una respuesta rápida en el tiempo, una implementación tecnológica adecuada y un análisis que aportaba valor a nuestras decisiones
              - text: Alejandro Fernández | Responsable Comercial Fundación la Caixa
          - group "4 / 8" [ref=e169]:
            - generic [ref=e172]:
